openapi: 3.0.3
info:
  title: Legacy API
  version: 1.0.0
paths:
  /users/{id}:
    get:
      operationId: getUser
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  email:
                    type: string
                    format: email
                  age:
                    type: integer
                    format: int32
                required:
                  - id
                  - email
