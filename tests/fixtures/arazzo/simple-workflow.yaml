arazzo: 1.0.0
info:
  title: Simple E-Commerce Workflow
  version: 1.0.0
  description: A simple workflow for testing
sourceDescriptions:
  - name: testAPI
    url: ../openapi/test-api.yaml
    type: openapi
workflows:
  - workflowId: getProduct
    summary: Get product details
    description: Retrieve product information by ID
    inputs:
      type: object
      properties:
        productId:
          type: string
          description: Product identifier
      required:
        - productId
    steps:
      - stepId: fetchProduct
        operationId: testAPI.getProduct
        parameters:
          - name: id
            in: path
            value: $inputs.productId
    outputs:
      productName: $steps.fetchProduct.outputs.name
      productPrice: $steps.fetchProduct.outputs.price
