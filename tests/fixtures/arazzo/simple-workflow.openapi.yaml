openapi: 3.1.0
info:
  title: Simple E-Commerce Workflow
  version: 1.0.0
  description: A simple workflow for testing
  x-arazzo-document: /Users/frank/GitHub/arazzo2openapi/tests/fixtures/arazzo/simple-workflow.yaml
servers:
  - url: https://api.test.com/v1
    description: Production server
  - url: https://staging-api.test.com/v1
    description: Staging server
paths:
  /workflows/getProduct:
    post:
      operationId: execute_getProduct
      x-arazzo-workflow-id: getProduct
      summary: Get product details
      description: Retrieve product information by ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                  description: Product identifier
              required:
                - productId
      responses:
        "200":
          description: Workflow getProduct executed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  productName:
                    type: string
                  productPrice:
                    type: number
                required:
                  - productName
                  - productPrice
