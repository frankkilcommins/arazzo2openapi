openapi: 3.1.0
info:
  title: Test API
  version: 1.0.0
  description: A test API for unit testing
servers:
  - url: https://api.test.com/v1
    description: Production server
  - url: https://staging-api.test.com/v1
    description: Staging server
paths:
  /products/{id}:
    get:
      operationId: getProduct
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  price:
                    type: number
